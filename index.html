<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aces</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("vite-ui-theme")
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
        const theme = storedTheme === "light" || storedTheme === "dark"
          ? storedTheme
          : prefersDark
            ? "dark"
            : "light"

        document.documentElement.classList.add(theme)
      })()
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: "Geist Variable", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 42%),
          #171717;
        color: #fafafa;
        overflow: hidden;
      }

      html.light body {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.9), transparent 42%),
          #f5f5f5;
        color: #171717;
      }

      #root {
        min-height: 100vh;
      }

      #boot-screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 42%),
          var(--boot-background, #171717);
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      html.light #boot-screen {
        --boot-background: #f5f5f5;
      }

      html.dark #boot-screen {
        --boot-background: #171717;
      }

      #boot-screen.boot-screen--hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-shell {
        display: flex;
        width: min(420px, calc(100vw - 48px));
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
      }

      .boot-logo {
        display: grid;
        place-items: center;
        width: 72px;
        height: 72px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04));
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.18);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      html.light .boot-logo {
        background: linear-gradient(135deg, rgba(23, 23, 23, 0.1), rgba(23, 23, 23, 0.04));
        box-shadow: 0 20px 45px rgba(23, 23, 23, 0.08);
      }

      .boot-copy {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .boot-title {
        margin: 0;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .boot-subtitle {
        margin: 0;
        color: rgba(250, 250, 250, 0.68);
        font-size: 14px;
      }

      html.light .boot-subtitle {
        color: rgba(23, 23, 23, 0.62);
      }

      .boot-progress {
        position: relative;
        width: min(240px, 70vw);
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      html.light .boot-progress {
        background: rgba(23, 23, 23, 0.08);
      }

      .boot-progress::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 40%;
        border-radius: inherit;
        background: currentColor;
        animation: boot-progress 1.15s ease-in-out infinite;
      }

      @keyframes boot-progress {
        0% {
          transform: translateX(-130%);
        }

        50% {
          transform: translateX(140%);
        }

        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-screen" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-logo">AC</div>
        <div class="boot-copy">
          <h1 class="boot-title">Aces</h1>
          <p class="boot-subtitle">Preparing your workspace</p>
        </div>
        <div class="boot-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
